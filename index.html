<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div id="app-container">
     <div class="search-container">
        <form action="#">
          <input type="text" placeholder="Enter city name" name="search">
          <button type="submit"></button>
        </form>
     </div>

     <div class="forcast-container">
        <div class="mid-forcast-container">
            <img src="images/weather-icon.png" alt="Weather Icon"></img>
            <p class="temp-mid">30 degrees</p>
            <p class="temp-place">China</p>
        </div>
        <div class="forcast-min-max">
            <p class="temp-min">Min: 20 degrees</p>
            <p class="temp-max">Max: 40 degrees</p>
        </div>
     </div>

     <div class="additional-info-container">
        <div class="humidity info-container">
            <img src="" alt="humidity image" class="additional-info-img"><img>
            <div class="additional-info-item">
              <p class="humidity percentage">59%</p>
              <p class="additional-info-text">Humidity</p>  
            </div>  
        </div>
        <div class="wind info-container">
            <img src="" alt="wind speed image" class="additional-info-img"><img>
            <div class="additional-info-item">
              <p class="wind percentage">10 km/h</p>
              <p class="additional-info-text">Wind Speed</p>  
            </div>  
        </div>
     </div>
     
    </div>
</body>
</html>
